services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salesai_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # Named volumes untuk persistent data (storage dan logs).
      # Tidak bergantung struktur folder host — lebih portable.
      - salesai_storage:/var/www/storage
      - salesai_cache:/var/www/bootstrap/cache
    environment:
      - TZ=Asia/Jakarta
      - APP_NAME=SalesAI
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost:7100}
      - LOG_CHANNEL=stack
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-salesai_db}
      - DB_USERNAME=${DB_USERNAME:-salesai}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_STORE=database
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      # Port 7100 di host → port 7000 di container (internal FrankenPHP).
      # Caddy di host yang reverse-proxy ke sini.
      - "127.0.0.1:7100:7000"
      # ^ bind ke 127.0.0.1 saja = hanya bisa diakses dari host, bukan dari internet.
      # Ini best-practice karena hanya Caddy yang butuh akses ke port ini.
    networks:
      - salesai_net
    depends_on:
      mysql:
        condition: service_healthy
    # Log rotation biar tidak fill disk
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mysql:
    image: mysql:8.0
    container_name: salesai_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-salesai_db}
      - MYSQL_USER=${DB_USERNAME:-salesai}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - TZ=Asia/Jakarta
    volumes:
      - salesai_mysql_data:/var/lib/mysql
    # Tidak expose port ke host — MySQL hanya diakses oleh container app lewat network internal.
    # Kalau Anda butuh akses dari DBeaver/phpMyAdmin untuk debug, uncomment baris di bawah
    # (recommended: bind ke 127.0.0.1 saja, lalu pakai SSH tunnel dari laptop):
    # ports:
    #   - "127.0.0.1:3307:3306"
    networks:
      - salesai_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Resource limits untuk VPS kecil (2GB RAM).
    # MySQL 8 bisa eat banyak RAM by default; cap-nya biar share dengan app.
    deploy:
      resources:
        limits:
          memory: 512M
    # MySQL config optimization untuk VPS kecil
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=50
      --default-authentication-plugin=mysql_native_password
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  salesai_net:
    driver: bridge

volumes:
  salesai_mysql_data:
    driver: local
  salesai_storage:
    driver: local
  salesai_cache:
    driver: local
